version: 2.1
jobs:
    checkout:
        docker:
            - image: cimg/openjdk:26.0
        steps:
            - checkout:
                method: full
            - restore_cache:
                key: zabbixsender-{{ checksum "pom.xml" }}
            - run: mkdir -p /home/circleci/.sonar/cache /home/circleci/.m2/repository
            - run:
                # A bug in dependency:go-offline, see https://issues.apache.org/jira/browse/MDEP-688
                command: "mvn -B dependency:resolve dependency:resolve-plugins sonar:help jacoco:help surefire:help gpg:help -Psonar,versions,gpgsign -s .circleci/settings.xml"
                environment:
                  MAVEN_OPTS: "-Xmx1024m"
            - persist_to_workspace:
                root: /
                paths:
                    - home/circleci/.m2/repository
                    - home/circleci/.sonar/cache
                    - home/circleci/project
    build:
        docker:
            - image: cimg/openjdk:26.0
        steps:
            - attach_workspace:
                at: /tmp/ws
            - run:
                command: |
                    mv -n /tmp/ws/home/circleci/.m2 /home/circleci/
                    mv -n /tmp/ws/home/circleci/project/* /home/circleci/project/
                    mv -n /tmp/ws/home/circleci/project/.??* /home/circleci/project/
            - run:
                command: mvn -B clean verify -DskipTests -s .circleci/settings.xml
                environment:
                    MAVEN_OPTS: "-Xmx2048m"
            - persist_to_workspace:
                root: /
                paths:
                    - home/circleci/.m2/repository
                    - home/circleci/project/target
    testsj26:
      docker:
        - image: cimg/openjdk:26.0
      steps:
        - attach_workspace:
            at: /tmp/ws
        - run:
            command: |
              mv -n /tmp/ws/home/circleci/.m2 /home/circleci/
              mv -n /tmp/ws/home/circleci/project/* /home/circleci/project/
              mv -n /tmp/ws/home/circleci/project/.??* /home/circleci/project/
        - run:
            command: |
              mkdir -p /tmp/$CIRCLE_JOB
              mvn -B verify -Pskip -Pjacoco -Darg.line="-Xmx2048m" -s .circleci/settings.xml
            environment:
              MAVEN_OPTS: "-Xmx1024m"
        - store_test_results:
            path: target/surefire-reports
        - persist_to_workspace:
            root: /
            paths:
              - home/circleci/.m2/repository
              - home/circleci/project/target
    testsj25:
      docker:
        - image: cimg/openjdk:25.0
      steps:
        - attach_workspace:
            at: /tmp/ws
        - run:
            command: |
              mv -n /tmp/ws/home/circleci/.m2 /home/circleci/
              mv -n /tmp/ws/home/circleci/project/* /home/circleci/project/
              mv -n /tmp/ws/home/circleci/project/.??* /home/circleci/project/
        - run:
            command: |
              mkdir -p /tmp/$CIRCLE_JOB
              mvn -B verify -Pskip -Darg.line="-Xmx2048m" -s .circleci/settings.xml
            environment:
              MAVEN_OPTS: "-Xmx1024m"
        - store_test_results:
            path: target/surefire-reports
    testsj21:
        docker:
            - image: cimg/openjdk:21.0
        steps:
            - attach_workspace:
                  at: /tmp/ws
            - run:
                  command: |
                      mv -n /tmp/ws/home/circleci/.m2 /home/circleci/
                      mv -n /tmp/ws/home/circleci/project/* /home/circleci/project/
                      mv -n /tmp/ws/home/circleci/project/.??* /home/circleci/project/
            - run:
                  command: |
                      mkdir -p /tmp/$CIRCLE_JOB
                      mvn -B test -Pskip -Darg.line="-Xmx2048m" -Djava.io.tmpdir="/tmp/$CIRCLE_JOB" -s .circleci/settings.xml
                  environment:
                      MAVEN_OPTS: "-Xmx1024m"
            - store_test_results:
                  path: target/surefire-reports
    testsj17:
      docker:
        - image: cimg/openjdk:17.0
      steps:
        - attach_workspace:
            at: /tmp/ws
        - run:
            command: |
              mv -n /tmp/ws/home/circleci/.m2 /home/circleci/
              mv -n /tmp/ws/home/circleci/.sonar /home/circleci/
              mv -n /tmp/ws/home/circleci/project/* /home/circleci/project/
              mv -n /tmp/ws/home/circleci/project/.??* /home/circleci/project/
        - run:
            command: |
              mkdir -p /tmp/$CIRCLE_JOB
              mvn -B test -Pskip -Darg.line="-Xmx2048m" -Djava.io.tmpdir="/tmp/$CIRCLE_JOB" -s .circleci/settings.xml
            environment:
              MAVEN_OPTS: "-Xmx512m"
        - store_test_results:
            path: target/surefire-reports
        #don't persist_to_workspace, can't be done in parallel with testsj13
    testsj11:
        docker:
            - image: cimg/openjdk:11.0
        steps:
            - attach_workspace:
                at: /tmp/ws
            - run:
                command: |
                    mv -n /tmp/ws/home/circleci/.m2 /home/circleci/
                    mv -n /tmp/ws/home/circleci/.sonar /home/circleci/
                    mv -n /tmp/ws/home/circleci/project/* /home/circleci/project/
                    mv -n /tmp/ws/home/circleci/project/.??* /home/circleci/project/
            - run:
                command: |
                    mkdir -p /tmp/$CIRCLE_JOB
                    mvn -B test -Pskip -Darg.line="-Xmx2048m" -Djava.io.tmpdir="/tmp/$CIRCLE_JOB" -s .circleci/settings.xml
                environment:
                    MAVEN_OPTS: "-Xmx512m"
            - store_test_results:
                path: target/surefire-reports
            #don't persist_to_workspace, can't be done in parallel with testsj13
    sonarpublish:
      docker:
        - image: cimg/openjdk:26.0
      steps:
        - attach_workspace:
            at: /tmp/ws
        - run:
            command: |
              mv -n /tmp/ws/home/circleci/.m2 /home/circleci/
              mv -n /tmp/ws/home/circleci/.sonar /home/circleci/
              mv -n /tmp/ws/home/circleci/project/* /home/circleci/project/
              mv -n /tmp/ws/home/circleci/project/.??* /home/circleci/project/
        - run:
            command: |
              # If no symbolic name, it's a PR, will not run sonar
              if [ -n "$(git symbolic-ref HEAD 2>/dev/null )" ] ; then
                echo "Doing sonar"
                mkdir -p /tmp/$CIRCLE_JOB
                mvn -B sonar:sonar -Psonar,skip -Darg.line="-Xmx2048m -Djava.io.tmpdir=/tmp/$CIRCLE_JOB" -s .circleci/settings.xml
              fi
            environment:
              MAVEN_OPTS: "-Xmx512m"
        - persist_to_workspace:
            root: /
            paths:
              - home/circleci/.m2/repository
              - home/circleci/.sonar/cache
    publish:
        docker:
            - image: cimg/openjdk:26.0
        steps:
            - attach_workspace:
                at: /tmp/ws
            - run:
                command: |
                    mv -n /tmp/ws/home/circleci/.m2 /home/circleci/
                    mv -n /tmp/ws/home/circleci/.sonar /home/circleci/
                    mv -n /tmp/ws/home/circleci/project/* /home/circleci/project/
                    mv -n /tmp/ws/home/circleci/project/.??* /home/circleci/project/
            - run:
                command: |
                    if [ -n "$SECRING_GPG_ASC_BASE64" ] ; then
                        echo "$SECRING_GPG_ASC_BASE64" | base64 --decode | gpg --batch --no-tty --import --yes
                        GPGSIGN="-P gpgsign -Dgpg.keyname=41438883"
                    fi
                    # If no symbolic name, it's a PR, will not publish results
                    # If not the official github, it's a fork, don't publish either
                    if [ -n "$(git symbolic-ref HEAD 2>/dev/null )"  -a "$CIRCLE_REPOSITORY_URL" == "git@github.com:fbacchella/zabbix-sender.git" ] ; then
                        PUBLISH="deploy"
                    else
                        PUBLISH="install"
                    fi
                    echo "publishing jobs: $PUBLISH"
                    mvn -B $PUBLISH -Pskip $GPGSIGN -Dmaven.test.skip=true -s .circleci/settings.xml
                environment:
                    MAVEN_OPTS: "-Xmx2048m"
            - store_artifacts:
                path: /home/circleci/.m2/repository/fr/loghub/zabbixsender
                destination: /
    savecache:
        docker:
            - image: cimg/openjdk:26.0
        steps:
            - attach_workspace:
                at: /tmp/ws
            - run:
                command: |
                    mv /tmp/ws/home/circleci/project/pom.xml /home/circleci/project/
                    mv /tmp/ws/home/circleci/.m2 /home/circleci/
                    mv /tmp/ws/home/circleci/.sonar /home/circleci/
            - save_cache:
                paths:
                    - /home/circleci/.m2/repository
                    - /home/circleci/.sonar/cache
                key: zabbixsender-{{ checksum "pom.xml" }}
workflows:
  version: 2.1
  build_and_test:
    jobs:
      - checkout
      - build:
          requires:
              - checkout
          context: "Security variables"
      - testsj11:
          requires:
              - build
      - testsj17:
          requires:
              - build
      - testsj21:
            requires:
                - build
      - testsj25:
          requires:
            - build
      - testsj26:
          requires:
            - build
      - sonarpublish:
          requires:
            - testsj26
          context: "Security variables"
      - publish:
          requires:
              - testsj11
              - testsj17
              - testsj21
              - testsj25
              - testsj26
          context: "Security variables"
      - savecache:
          requires:
              - publish
